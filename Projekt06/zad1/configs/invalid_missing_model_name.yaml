project_name: iris-classification-template
experiment_name: invalid_missing_model_name
random_seed: 42

paths:
  raw_csv: data/raw/iris.csv
  dataset_metadata: data/raw/dataset_metadata.json
  processed_dir: data/processed/invalid_missing_model_name
  preprocessor_artifact: models/invalid_missing_model_name/preprocessor.json
  model_checkpoint: models/invalid_missing_model_name/model.pt
  training_history_csv: reports/invalid_missing_model_name/training_history.csv
  training_summary_json: reports/invalid_missing_model_name/training_summary.json
  evaluation_json: reports/invalid_missing_model_name/evaluation.json
  predictions_csv: reports/invalid_missing_model_name/test_predictions.csv
  confusion_matrix_png: reports/invalid_missing_model_name/confusion_matrix.png
  pairplot_png: reports/global/iris_pairplot.png
  feature_hist_png: reports/global/feature_histograms.png
  training_curves_png: reports/invalid_missing_model_name/training_curves.png

data:
  target_column: species
  feature_columns:
    - sepal_length_cm
    - sepal_width_cm
    - petal_length_cm
    - petal_width_cm
  class_names:
    - setosa
    - versicolor
    - virginica
  test_size: 0.2
  validation_size: 0.2

preprocessing:
  strategy: zscore

model: {}

training:
  hidden_dims: [16, 16]
  learning_rate: 0.01
  epochs: 150
  batch_size: 16
  weight_decay: 0.0001

visualization:
  figure_dpi: 160

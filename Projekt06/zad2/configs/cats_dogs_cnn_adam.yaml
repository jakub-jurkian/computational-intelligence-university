project_name: cats-dogs-cnn
experiment_name: cnn_adam_augmented

paths:
  dataset_dir: data/raw/dogs-cats-mini
  report_dir: reports/cnn_adam_augmented
  model_dir: models/cnn_adam_augmented

data:
  class_names: [cat, dog]
  img_size: 160
  val_size: 0.1
  test_size: 0.1
  random_seed: 42
  num_workers: 2

augmentation:
  horizontal_flip: true
  rotation_degrees: 15
  color_jitter: true

model:
  type: cnn
  cnn:
    filters: [32, 64, 128]
    activation: relu
    dropout: 0.4
  transfer:
    backbone: resnet18
    freeze_backbone_epochs: 0
    pretrained: false

training:
  epochs: 8
  batch_size: 64
  learning_rate: 0.001
  optimizer: adam
  weight_decay: 0.0001
  momentum: 0.9
  checkpoint_name: best.pt
